name: GymCircleNative

options:
  bundleIdPrefix: com.gymcircle
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  GymCircleNative:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/GymCircleNativeFoundation
      - path: Sources/GymCircleNativeApp
      # Sprint 20.8 cutover — ícones/splash da marca (copiados do shell ios/App).
      - path: Resources/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
    # Sprint 20.0 — config do standalone: Shared.xcconfig faz #include?
    # opcional do Secrets.xcconfig (gitignorado). Sem ele o app builda e
    # cai no modo demo; com ele, conecta no Supabase real.
    configFiles:
      Debug: Config/Shared.xcconfig
      Release: Config/Shared.xcconfig
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: Gym Circle Native
        # Sprint 20.8 cutover — versão de marketing 2.0.0 (salto pro nativo).
        CFBundleShortVersionString: "2.0.0"
        # build 73 (30/jun): fix novo chat ("não segue ninguém") — recarrega
        # seguindo ao abrir o sheet + busca de pessoas. + fix perfil de terceiros
        # + double-tap-to-like + comentários = web.
        # Cada archive novo precisa de build number único (ASC rejeita repetido).
        # build 82 (05/jul): séries/reps na musculação (gravar + exibir no
        # detalhe, paridade web).
        CFBundleVersion: "82"
        # Conformidade de exportação: o app só usa HTTPS/TLS padrão + Keychain
        # (criptografia ISENTA, sem nada proprietário). NO limpa o "Faltam dados
        # de conformidade" automaticamente nos próximos builds.
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        # Sprint 20.0 — resolvidas no build a partir do xcconfig; o
        # AppConfiguration.fromBundle() lê daqui (vazio ⇒ modo demo).
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        # Launch screen preta (fundo da splash da marca) — evita o flash branco
        # antes do SplashView SwiftUI montar e mostrar a arte completa.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: Use a câmera para postar treinos e stories no Gym Circle.
        NSPhotoLibraryUsageDescription: Escolha fotos e vídeos da galeria para posts, stories e mensagens.
        NSMicrophoneUsageDescription: Grave áudio ao publicar vídeos de treino.
        NSLocationWhenInUseUsageDescription: Use sua localização para encontrar academias próximas, fazer check-in e traçar a rota de treinos ao ar livre.
        # Fase 2 (GPS outdoor): rota continua gravando com a tela apagada.
        UIBackgroundModes:
          - location
        NSHealthShareUsageDescription: O Gym Circle lê seus treinos do Apple Saúde para enriquecer resumos e estatísticas, somente com sua permissão.
        NSHealthUpdateUsageDescription: O Gym Circle pode preparar treinos para o Apple Saúde em versões futuras, sempre com sua permissão.
    settings:
      base:
        # Cutover (15/jun): bundle id flipado pra com.gymcircle.app DEPOIS de
        # habilitar Push + Associated Domains + HealthKit no Apple Developer.
        PRODUCT_BUNDLE_IDENTIFIER: com.gymcircle.app
        PRODUCT_NAME: GymCircleNative
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "47"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Support/GymCircleNative.entitlements
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "NO"
        # Cutover: simulador/CI buildam sem signing (sem team); o DEVICE
        # (archive/TestFlight) assina normal com o Team setado no Xcode.
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production

  # Sprint 9.9.7 — unit-test target (P1 #6).
  GymCircleNativeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests/GymCircleNativeFoundationTests
    dependencies:
      - target: GymCircleNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymcircle.app.tests
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"

schemes:
  GymCircleNative:
    build:
      targets:
        GymCircleNative: all
        GymCircleNativeTests: [test]
    test:
      config: Debug
      targets:
        - GymCircleNativeTests
    run:
      config: Debug
    archive:
      config: Release

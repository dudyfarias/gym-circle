<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Gym Circle</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter",
          sans-serif;
        background: #000;
        color: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding:
          max(24px, env(safe-area-inset-top))
          24px
          max(24px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 50% 24%, rgba(140, 251, 255, 0.16), transparent 34%),
          #000;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      .mark {
        width: 84px;
        height: 84px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: rgba(17, 17, 17, 0.88);
        box-shadow: 0 0 40px rgba(140, 251, 255, 0.22);
      }

      .ring {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 8px solid rgba(140, 251, 255, 0.28);
        border-right-color: #8cfbff;
        border-bottom-color: #30d5ff;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: #a1a1aa;
        font-size: 15px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        min-height: 52px;
        margin-top: 28px;
        border: 0;
        border-radius: 999px;
        background: #8cfbff;
        color: #000;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <div class="ring"></div>
      </div>
      <h1>Gym Circle</h1>
      <p>
        Não foi possível carregar o app agora. Verifique sua conexão e tente
        novamente.
      </p>
      <button type="button" onclick="window.location.reload()">Tentar de novo</button>
    </main>
  </body>
</html>
